<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabinet Studio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="app">
        <!-- Top Navigation -->
        <header class="topbar">
            <div class="brand">
                <div class="brand-icon">📦</div>
                <div>
                    <h1>Cabinet Studio</h1>
                    <span>Engineering Workspace</span>
                </div>
            </div>
            <div class="toolbar-actions">
                <button class="tool-btn" onclick="Cabinet3DModel.build()">Generate 3D Wardrobe</button>
                <button class="tool-btn">Save Project</button>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="workspace">
            <aside class="sidebar">
                <div class="menu">
                    <button class="menu-item">Cabinets</button>
                    <button class="menu-item">Compartments</button>
                    <button class="menu-item">Settings</button>
                </div>
            </aside>

            <section class="canvas-area">
                <div class="canvas-header">
                    <h2>Design Workspace</h2>
                </div>
                
                <!-- This is where your 3D view lives -->
                <div id="threeViewer"></div>
                
                <div class="design-board">
                    <div class="empty-state">
                        <div class="cube">🗄️</div>
                        <p>Workspace Ready</p>
                    </div>
                </div>
            </section>

            <aside class="inspector">
                <div class="panel-title">INSPECTOR</div>
                <div class="property-card">
                    <label>Project</label>
                    <div class="value">Untitled Project</div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Scripts: Note the order! -->
    <!-- 1. Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- 2. Core Logic (Ensure filenames match your files exactly) -->
    <script src="three-setup.js"></script>
    <script src="design-storage.js"></script> <!-- Keep only this one -->
    <script src="cabinet-3d-model.js"></script>
    <script src="app.js"></script>

</body>
</html>
