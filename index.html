<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iDesign Studio</title>
    <!-- Keep this linked to your CSS file for the "Studio" look -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- This wrapper is the only container needed; all original content is inside -->
    <div id="app">

        <!-- Toolbar: Using your original structure -->
        <header class="toolbar">
            <div class="brand">Cabinet Studio</div>
            <div class="actions">
                <button onclick="App.newProject()">New</button>
                <button onclick="App.saveProject()">Save</button>
                <button class="primary" onclick="App.generate()">Generate</button>
                <button onclick="App.undo()">Undo</button>
                <button onclick="App.redo()">Redo</button>
                <button onclick="App.exportCuttingList()">Export Cutting List</button>
            </div>
        </header>

        <!-- Sidebar: Using your original structure -->
        <aside class="sidebar">
            <h3>Wardrobe Input</h3>
            <label>Compartment Width</label>
            <input type="number" id="comp-width" value="600">
            
            <label>Type</label>
            <select id="comp-type">
                <option value="hanging">Hanging</option>
                <option value="folding">Folding</option>
                <option value="open">Open</option>
            </select>

            <div class="checkbox-group">
                <input type="checkbox" id="add-doors"> <label>Add Doors</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="add-drawers"> <label>Add Drawers</label>
            </div>

            <button onclick="App.addComponent()">Add Compartment</button>
        </aside>

        <!-- Main Canvas: Restored to original hierarchy -->
        <main class="canvas-area" id="canvas-container">
            <!-- Your 3D engine scripts inject the canvas here -->
        </main>

        <!-- Inspector: Restored to original hierarchy -->
        <aside class="inspector">
            <h3>Inspector</h3>
            <div id="inspector-data"></div>
            
            <h3>Cutting List</h3>
            <div id="cutting-list-output"></div>
        </aside>

    </div>

    <!-- SCRIPTS: Exact list from your repository -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
    <script src="data-model.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/controls/OrbitControls.js" defer></script>
    <script src="cabinet-3d-model.js" defer></script>
    <script src="3d-door-system.js" defer></script>
    <script src="3d-shelf-system.js" defer></script>
    <script src="Camera-Controls-3D.js" defer></script>
    <script src="three-setup.js" defer></script>
    <script src="engineering-rules.js" defer></script>
    <script src="engineering-validator.js" defer></script>
    <script src="door-engine.js" defer></script>
    <script src="drawer-engine.js" defer></script>
    <script src="cabinet-engine-integration.js" defer></script>
    <script src="material-manager.js" defer></script>
    <script src="production-output.js" defer></script>
    <script src="sheet-manager.js" defer></script>
    <script src="nesting-engine.js" defer></script>
    <script src="cutting-layout.js" defer></script>
    <script src="cutting-layout-integration.js" defer></script>
    <script src="production-export.js" defer></script>
    <script src="nesting-settings.js" defer></script>
    <script src="cabinet-canvas.js" defer></script>
    <script src="resize-handles.js" defer></script>
    <script src="property-inspector.js" defer></script>
    <script src="undo-redo-system.js" defer></script>
    <script src="design-storage.js" defer></script>
    <script src="cutting-list.js" defer></script>
    <script src="project-ui.js" defer></script>
    <script src="generator-ui.js" defer></script>
    <script src="preview-engine.js" defer></script>
    <script src="dimension-system.js" defer></script>
    <script src="interaction-system.js" defer></script>
    <script src="layout-engine.js" defer></script>
    <script src="layout-optimizer.js" defer></script>
    <script src="auto-layout-ui.js" defer></script>
    <script src="layout-preview-sync.js" defer></script>
    <script src="cabinet-engine.js" defer></script>
    <script src="cabinet-module.js" defer></script>
    <script src="app.js" defer></script>

</body>
</html>
