<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iDesign Studio</title>
    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="styles.css">
    <!-- Load Three.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="app">
        <!-- Top Toolbar -->
        <header class="toolbar">
            <div class="brand">Cabinet Studio</div>
            <div class="actions">
                <button onclick="console.log('New Project')">New</button>
                <button onclick="console.log('Save Project')">Save</button>
                <button class="primary" onclick="window.iDesign.Cabinet.build()">Generate</button>
            </div>
        </header>

        <!-- Sidebar: Inputs -->
        <aside class="sidebar">
            <section class="control-group">
                <h3>Wardrobe Input</h3>
                <label>Compartment Width</label>
                <input type="number" id="comp-width" value="600">
                
                <label>Type</label>
                <select id="comp-type">
                    <option value="hanging">Hanging</option>
                    <option value="folding">Folding</option>
                    <option value="open">Open</option>
                </select>

                <div class="checkbox-group" style="margin-bottom: 15px;">
                    <input type="checkbox" id="add-doors" style="width: auto;"> 
                    <label style="display: inline;">Add Doors</label>
                </div>

                <button style="width: 100%;">Add Compartment</button>
            </section>
        </aside>

        <!-- Main Canvas: 3D Workspace -->
        <main class="canvas-area" id="canvas-container">
            <!-- Your 3D engine will inject the canvas here -->
        </main>

        <!-- Right Panel: Inspector -->
        <aside class="inspector">
            <h3>Inspector</h3>
            <div id="inspector-data">
                <p>Project: Untitled Project</p>
                <p>Height: 2700 mm</p>
                <p>Depth: 600 mm</p>
            </div>
            
            <h3>Cutting List</h3>
            <div id="cutting-list-output">
                <!-- Data injected from engine -->
            </div>
        </aside>
    </div>

    <!-- Your script files -->
    <script src="cabinet-engine.js"></script>
    <script src="cabinet-module.js"></script>
    <script src="generator-ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
